name: Mutiny
options:
  bundleIdPrefix: com.jeffhobbs
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO
targets:
  Mutiny:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Resources
    entitlements:
      path: Mutiny.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.camera: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
    info:
      path: Info.plist
      properties:
        CFBundleName: Mutiny
        CFBundleDisplayName: Mutiny
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "© 2026 Jeff Hobbs"
        NSCameraUsageDescription: "Mutiny uses your Mac or iPhone (Continuity) camera to scan the barcodes on CDs, tapes, and records."
        NSMainStoryboardFile: ""
        LSMinimumSystemVersion: "14.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jeffhobbs.Mutiny
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
